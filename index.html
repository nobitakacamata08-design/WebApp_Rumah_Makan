<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebApp Sudah Terjual</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        .animation-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 120px;
        }

        .animated-icon {
            width: 100px;
            height: auto;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        .badge {
            background-color: #ffebee;
            color: #c62828;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 1.8rem;
            color: #1a1a1a;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .btn-kontak {
            display: inline-block;
            background-color: #d32f2f;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
        }

        .btn-kontak:hover {
            background-color: #b71c1c;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="animation-container" id="icon-animasi">
            <img src="https://i.ibb.co.com/6J8qPn3c/strategic-alliance-18641732.gif" alt="Icon WebApp" class="animated-icon">
        </div>

        <div class="badge">Sudah Terjual</div>
        
        <h1>Terima Kasih</h1>
        <p>Terima kasih banyak atas kunjungan Anda. WebApp ini telah resmi terjual dan tidak lagi tersedia.</p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">
        
        <p style="font-size: 0.95rem; margin-bottom: 15px; color: #444;">
            Info Pemesanan Silahkan Hubungi Kontak
        </p>
        
        <a href="https://wa.me/628xxxxxxxxxx" class="btn-kontak" target="_blank">
            Hubungi Kontak
        </a>
    </div>

</body>
</html>
